name: CI
on:
  push:
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile-check all Python files
        run: |
          python - <<'PYEOF'
          import ast, os, sys
          bad = []
          SKIP = {'.git','node_modules','venv','.venv','target','dist','build','__pycache__','notebooks'}
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in SKIP]
              for f in files:
                  if f.endswith('.py'):
                      p = os.path.join(root, f)
                      try:
                          ast.parse(open(p,'rb').read(), filename=p)
                      except SyntaxError as e:
                          bad.append(f"{p}:{e.lineno}: {e.msg}")
          print("\n".join(bad))
          sys.exit(1 if bad else 0)
          PYEOF

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: npx prisma generate
      - run: npx tsc --noEmit
